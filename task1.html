<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1 — Электрическая цепь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -200px;
        }

        /* Шапка */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 5;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
        }

        .task-title {
            font-size: 22px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 200px;
        }

        .btn-tasks {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-tasks:hover {
            background: #fff;
            color: #764ba2;
            transform: translateY(-2px);
        }

        /* Подсказка */
        .hint {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            opacity: 0.9;
            position: relative;
            z-index: 5;
            max-width: 900px;
            width: 100%;
        }

        .hint strong {
            color: #ffd700;
        }

        /* Рабочая область */
        .workspace {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            overflow: visible;
            z-index: 5;
        }

        /* SVG для соединений */
        .connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .connection-line {
            stroke: #ffd700;
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
            transition: stroke 0.3s ease;
        }

        .connection-line.active {
            stroke: #ffeb3b;
            filter: drop-shadow(0 0 12px rgba(255, 235, 59, 0.9));
        }

        /* Объекты */
        .object {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
            transition: transform 0.3s ease;
        }

        .object-content {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .object img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
            transition: filter 0.4s ease, transform 0.3s ease;
        }

        .object.lit img {
            filter: drop-shadow(0 0 25px rgba(255, 235, 59, 0.9)) 
                    drop-shadow(0 0 45px rgba(255, 200, 0, 0.6));
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 235, 59, 0.8)) 
                        drop-shadow(0 0 35px rgba(255, 200, 0, 0.5));
            }
            to {
                filter: drop-shadow(0 0 30px rgba(255, 235, 59, 1)) 
                        drop-shadow(0 0 55px rgba(255, 200, 0, 0.8));
            }
        }

        .label {
            margin-top: 8px;
            padding: 5px 14px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Узлы */
        .node {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .node:hover {
            transform: scale(1.3);
            background: #ffd700;
            border-color: #ffd700;
        }

        .node.selected {
            background: #ff6b6b;
            border-color: #ff6b6b;
            transform: scale(1.4);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 107, 107, 0.8); }
            50% { box-shadow: 0 0 25px rgba(255, 107, 107, 1); }
        }

        .node.connected {
            background: #4ade80;
            border-color: #4ade80;
        }

        /* Расположение объектов */
        .object.battery {
            top: 50%;
            left: 8%;
            transform: translateY(-50%);
        }

        .object.wire-top {
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
        }

        .object.lamp {
            top: 50%;
            right: 8%;
            transform: translateY(-50%);
        }

        .object.wire-bottom {
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Кнопки управления и статус — всегда видны */
        .controls-wrapper {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #fff;
            color: #764ba2;
            transform: translateY(-2px);
        }

        /* Статус */
        .status {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            min-height: 26px;
            transition: all 0.3s ease;
            padding: 0 20px;
        }

        .status.success {
            color: #4ade80;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .task-title {
                font-size: 18px;
                text-align: center;
            }

            .btn-tasks {
                align-self: center;
            }

            .workspace {
                height: 450px;
            }

            .object img {
                width: 90px;
                height: 90px;
            }

            .object.battery { left: 3%; }
            .object.lamp { right: 3%; }

            .node {
                width: 16px;
                height: 16px;
            }

            .hint {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .workspace {
                height: 400px;
            }

            .object img {
                width: 70px;
                height: 70px;
            }

            .label {
                font-size: 11px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="top-bar">
        <h1 class="task-title">Соберите простую цепь из провода, лампочки и батарейки</h1>
        <a href="tasks.html" class="btn-tasks">К заданиям</a>
    </div>

    <p class="hint"> <strong>Кликайте по двум узлам</strong>, чтобы соединить их. Повторный клик — разъединит.</p>

    <!-- Рабочая область -->
    <div class="workspace" id="workspace">
        <svg class="connections" id="svg"></svg>

        <!-- Батарейка (слева) — узлы сверху и снизу -->
        <div class="object battery">
            <div class="object-content">
                <div class="node" data-id="battery-top" data-group="battery"></div>
                <img src="image/battery.png" alt="Батарейка">
                <div class="node" data-id="battery-bottom" data-group="battery"></div>
            </div>
            <div class="label">Батарейка</div>
        </div>

        <!-- Провод 1 (сверху) — узлы слева и справа -->
        <div class="object wire-top">
            <div class="object-content">
                <div class="node" data-id="wire-top-left" data-group="wire-top"></div>
                <img src="image/Provod.png" alt="Провод">
                <div class="node" data-id="wire-top-right" data-group="wire-top"></div>
            </div>
            <div class="label">Провод</div>
        </div>

        <!-- Лампочка (справа) — узлы сверху и снизу -->
        <div class="object lamp">
            <div class="object-content">
                <div class="node" data-id="lamp-top" data-group="lamp"></div>
                <img src="image/lampa.png" alt="Лампочка" id="lamp-img">
                <div class="node" data-id="lamp-bottom" data-group="lamp"></div>
            </div>
            <div class="label">Лампочка</div>
        </div>

        <!-- Провод 2 (снизу) — узлы слева и справа -->
        <div class="object wire-bottom">
            <div class="object-content">
                <div class="node" data-id="wire-bottom-left" data-group="wire-bottom"></div>
                <img src="image/Provod.png" alt="Провод">
                <div class="node" data-id="wire-bottom-right" data-group="wire-bottom"></div>
            </div>
            <div class="label">Провод</div>
        </div>
    </div>

    <!-- Кнопки и статус — всегда видны -->
    <div class="controls-wrapper">
        <div class="controls">
            <button class="btn" onclick="resetAll()"> Сбросить всё</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // Состояние
        let selectedNode = null;
        const connections = new Map();

        // Путь к картинкам
        const LAMP_OFF = 'image/lampa.png';
        const LAMP_ON = 'image/gorlamp.png';

        const lampImg = document.getElementById('lamp-img');
        const svg = document.getElementById('svg');
        const statusEl = document.getElementById('status');
        const workspace = document.getElementById('workspace');

        // Все узлы
        const nodes = document.querySelectorAll('.node');

        // Обработчик клика по узлу
        nodes.forEach(node => {
            node.addEventListener('click', () => handleNodeClick(node));
        });

        function handleNodeClick(node) {
            const id = node.dataset.id;

            if (selectedNode === node) {
                node.classList.remove('selected');
                selectedNode = null;
                return;
            }

            if (!selectedNode) {
                selectedNode = node;
                node.classList.add('selected');
                return;
            }

            if (selectedNode.dataset.group === node.dataset.group) {
                selectedNode.classList.remove('selected');
                selectedNode = node;
                node.classList.add('selected');
                return;
            }

            const id1 = selectedNode.dataset.id;
            const id2 = id;
            const key = [id1, id2].sort().join('|');

            if (connections.has(key)) {
                removeConnection(key);
            } else {
                addConnection(selectedNode, node, key);
            }

            selectedNode.classList.remove('selected');
            selectedNode = null;

            checkCircuit();
        }

        function addConnection(node1, node2, key) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.classList.add('connection-line');
            svg.appendChild(line);

            connections.set(key, {
                from: node1,
                to: node2,
                line: line
            });

            node1.classList.add('connected');
            node2.classList.add('connected');

            updateLines();
        }

        function removeConnection(key) {
            const conn = connections.get(key);
            if (!conn) return;

            conn.line.remove();
            connections.delete(key);

            updateNodeStates();
            updateLines();
        }

        function updateNodeStates() {
            nodes.forEach(n => n.classList.remove('connected'));

            connections.forEach(conn => {
                conn.from.classList.add('connected');
                conn.to.classList.add('connected');
            });
        }

        function updateLines() {
            const workspaceRect = workspace.getBoundingClientRect();

            connections.forEach(conn => {
                const fromRect = conn.from.getBoundingClientRect();
                const toRect = conn.to.getBoundingClientRect();

                const x1 = fromRect.left + fromRect.width / 2 - workspaceRect.left;
                const y1 = fromRect.top + fromRect.height / 2 - workspaceRect.top;
                const x2 = toRect.left + toRect.width / 2 - workspaceRect.left;
                const y2 = toRect.top + toRect.height / 2 - workspaceRect.top;

                conn.line.setAttribute('x1', x1);
                conn.line.setAttribute('y1', y1);
                conn.line.setAttribute('x2', x2);
                conn.line.setAttribute('y2', y2);
            });
        }

        function checkCircuit() {
            const groups = ['battery', 'wire-top', 'lamp', 'wire-bottom'];
            
            if (connections.size !== 4) {
                lampOff();
                updateStatus('', false);
                return;
            }

            const degree = {};
            groups.forEach(g => degree[g] = 0);

            connections.forEach(conn => {
                const g1 = conn.from.dataset.group;
                const g2 = conn.to.dataset.group;
                degree[g1]++;
                degree[g2]++;
            });

            const allTwo = groups.every(g => degree[g] === 2);

            if (allTwo) {
                lampOn();
                updateStatus('Отлично! Цепь собрана — лампочка горит!', true);
            } else {
                lampOff();
                updateStatus('', false);
            }
        }

        function lampOn() {
            lampImg.src = LAMP_ON;
            document.querySelector('.object.lamp').classList.add('lit');
            connections.forEach(conn => conn.line.classList.add('active'));
        }

        function lampOff() {
            lampImg.src = LAMP_OFF;
            document.querySelector('.object.lamp').classList.remove('lit');
            connections.forEach(conn => conn.line.classList.remove('active'));
        }

        function updateStatus(text, success) {
            statusEl.textContent = text;
            statusEl.classList.toggle('success', success);
        }

        function resetAll() {
            connections.forEach(conn => conn.line.remove());
            connections.clear();
            updateNodeStates();

            if (selectedNode) {
                selectedNode.classList.remove('selected');
                selectedNode = null;
            }

            lampOff();
            updateStatus('', false);
        }

        window.addEventListener('resize', updateLines);
        window.addEventListener('scroll', updateLines);

        setTimeout(updateLines, 100);
    </script>
</body>
</html>
