<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -200px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 5;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h1 {
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }

        .card .subtitle {
            text-align: center;
            opacity: 0.8;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0.9;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.18);
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
        }

        .form-group input.error {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
        }

        .error-message {
            color: #ff9a9a;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #764ba2;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            background: #f0e6ff;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0 15px;
            opacity: 0.7;
            font-size: 14px;
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .card {
                padding: 35px 25px;
            }
            .card h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Регистрация</h1>
        <p class="subtitle">Создайте аккаунт, чтобы участвовать в хакатоне</p>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="email">Адрес электронной почты / Телефон</label>
                <input type="text" id="email" placeholder="example@mail.ru или +7..." required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
                <div class="error-message" id="error">Пароли не совпадают</div>
            </div>

            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>

        <div class="divider">Уже есть аккаунт?</div>
        <a href="login.html" class="btn-secondary">Войти</a>

        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('error');
            const confirmInput = document.getElementById('confirmPassword');

            // Проверка совпадения паролей
            if (password !== confirmPassword) {
                errorEl.classList.add('show');
                confirmInput.classList.add('error');
                return;
            }

            // Проверка длины пароля
            if (password.length < 6) {
                alert('Пароль должен быть не менее 6 символов');
                return;
            }

            errorEl.classList.remove('show');
            confirmInput.classList.remove('error');
            
            alert('Регистрация успешна! (это заглушка — здесь будет отправка данных на сервер)');
            // window.location.href = 'tasks.html';
        }

        // Убираем ошибку при вводе
        document.getElementById('confirmPassword').addEventListener('input', function() {
            document.getElementById('error').classList.remove('show');
            this.classList.remove('error');
        });
    </script>
</body>
</html>
