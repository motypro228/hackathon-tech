<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Образовательный хакатон</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* Декоративные круги на фоне */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -200px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            position: relative;
            z-index: 10;
        }

        .logo img {
            height: 60px;
            width: auto;
            display: block;
            border-radius: 8px;
        }

        /* Заглушка, если логотип не загружен */
        .logo-placeholder {
            height: 60px;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-login {
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #fff;
            color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 110px);
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .title {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 50px;
            opacity: 0.9;
            max-width: 600px;
        }

        .btn-start {
            padding: 20px 60px;
            background: #fff;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-start::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(118, 75, 162, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-start:hover::before {
            left: 100%;
        }

        .btn-start:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            background: #f0e6ff;
        }

        .btn-start:active {
            transform: translateY(-1px) scale(1.02);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            .logo img,
            .logo-placeholder {
                height: 45px;
            }

            .btn-login {
                padding: 10px 20px;
                font-size: 14px;
            }

            .title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 35px;
            }

            .btn-start {
                padding: 16px 40px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <header>
        <!-- Логотип слева сверху. Замените src="logo.png" на путь к вашему файлу -->
        <a href="logo.html" class="logo">
            <img src="image/logo.png" alt="Логотип хакатона">
        </a>

        <!-- Кнопка "Войти" справа сверху -->
        <a href="login.html" class="btn-login">Войти</a>
    </header>

    <main>
        <h1 class="title">Образовательный хакатон</h1>
        <p class="subtitle">Проявите свои навыки, решайте реальные задачи и учитесь новому вместе с командой</p>

        <!-- Главная кнопка по центру -->
        <a href="tasks.html" class="btn-start">Приступить к заданиям</a>
    </main>
</body>
</html>
